<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시멘틱 Header</title>
    <style>
        header {
            border-radius: 10px;
            box-shadow: 0px 4px 30px black;
            background-color: black;
            color: white;
            padding: 20px;
            padding: 15px 0;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 1.8em;
            font-weight: bold;
        }

        .top-menu {
            display: flex;
            gap: 30px;
        }

        .top-menu a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .top-menu a:hover {
            background-color: #737373;
            font-weight: bold;
        }

        fieldset {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
        <div class="logo">Sparklx Blog</div>    
        <nav class="top-menu">
        <a href="#home">홈</a>
        <a href="#portfolio">포트폴리오</a> 
        <a href="https://github.com/Linkshimcat">GitHub</a> 
        </nav>
        </div>
    </header>
    <br>
    <main>
        <fieldset>
        <p>여기에 메인 콘텐츠가 들어갑니다.</p>
        </fieldset>
    </main>
    <br>
    <main>
        <fieldset>
        <p>여기에 메인 콘텐츠가 들어갑니다.</p>
        </fieldset>
    </main>
</body>
</html>
