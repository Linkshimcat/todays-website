<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkshimcat's Cards</title>
    <style>

        body {
            padding:55px;
            background-color: #FFFDD0;
        }

        .title {
            display: flex;
            align-items: center; /* 세로 가운데 정렬 */
            gap: 12px; /* 이미지랑 텍스트 간격 */
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 1px 1px 26px #000000;
        }

        .UI {
            box-shadow: 2px 7px 65px #4d4c3e;
            border-width: 2px;
            border-radius: 25px;
            border-color:black;
            margin:0px;
            padding:8px 12px;
        }

        ul li {
            list-style: none;
            font-size:large;
        }

        .img {
            border-radius: 100%;
            width: 10%;
            height: 10%;
            object-fit: cover,auto;
        }

        .img2 {
            width: 100%;
            height: 125px;
            filter: blur(3rem);
        }

        hr {
            border-color: rgb(15, 15, 15);
        }

        button {
            border-radius: 20px;
            border-width: 0px;
            width: 120px;
            height: 40px;
            background-color: #ffff79;
            font-size: 15px;
        }

        button.hover {
            border-radius: 20px;
            border-width: 0px;
            width: 120px;
            height: 40px;
            background-color: #000000;
            font-size: 15px;
        }

        a {
            text-decoration: none;
        }

        h1 ul li {
            width: auto;
            height: auto;
        }


    </style>

</head>
<body>
    <h1 class="title">My Profile Cards</h1>
    <form>
        <fieldset class="UI">
            <img class="img2" src="https://i.pinimg.com/736x/d7/bb/69/d7bb69e05864931f436c83fb9bdf67e2.jpg">
            <h1 class="title"><img class="img" src="https://i.pinimg.com/736x/d7/bb/69/d7bb69e05864931f436c83fb9bdf67e2.jpg">Linkshimcat</h1>
            <hr>
            <ul>
                <li><strong>✦ 생일🎂: 2010.12.12</strong></li>
                <li><strong>✦ 나이🪪: 17세</strong></li>
                <li><strong>✦ 학교🏫: 미림마이스터고등학교 / 1학년 2반 11번</strong></li>
                <li><strong>✦ 전공📚: 뉴미디어소프트웨어과</strong></li>
            </ul>

            <button><a href="https://github.com/Linkshimcat">GitHub Profile</a></button>
        </fieldset>

        
    </form>
</body>
</html>
